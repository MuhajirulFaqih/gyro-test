<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SOCAi Dramatic Magnetic Wrap</title>

<style>
body{
  margin:0;background:#0f0f14;height:100vh;
  display:flex;align-items:center;justify-content:center;
  font-family:system-ui;color:#fff;
}

.stage{
  position:relative;width:340px;height:340px;
  border-radius:28px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  overflow:hidden;
  perspective:1400px;
}

/* OUTER STATIC GRID */
.outer{
  position:absolute;inset:0;opacity:.6;
  background:
    linear-gradient(to right, rgba(255,255,255,.25) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,.25) 1px, transparent 1px);
  background-size:28px 28px;
}

/* INNER WRAP */
.inner{
  position:absolute;inset:-40px;
  transform-style:preserve-3d;
  will-change:transform, filter;
}

/* DOT GRID */
.grid{
  position:absolute;inset:0;
  background:
    radial-gradient(circle, rgba(255,255,255,.28) 1.5px, transparent 1.6px);
  background-size:20px 20px;
  opacity:.85;
}

/* DRAMATIC SHADOW TENSION */
.shadow{
  position:absolute;inset:0;
  background:radial-gradient(circle at 50% 50%,
    rgba(0,0,0,.4) 0%,
    rgba(0,0,0,.25) 35%,
    transparent 70%);
  mix-blend-mode:multiply;
}

/* TARGET RING */
.ringWrap{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.ring{
  width:190px;height:190px;border-radius:999px;
  border:3px solid rgba(255,255,255,.5);
}

/* ARROWS */
.arrow{
  position:absolute;
  font-size:28px;
  opacity:0;
  transition:all .2s ease;
}

.arrow.show{
  opacity:1;
  transform:scale(1.2);
}

.arrow.left{ left:10px; top:50%; transform:translateY(-50%); }
.arrow.right{ right:10px; top:50%; transform:translateY(-50%); }
.arrow.up{ top:10px; left:50%; transform:translateX(-50%); }
.arrow.down{ bottom:10px; left:50%; transform:translateX(-50%); }

.meta{
  margin-top:16px;text-align:center;font-size:14px;opacity:.85;
}

button{
  margin-top:12px;padding:10px 16px;
  background:#222;border:1px solid #444;color:#fff;border-radius:10px;
}
</style>
</head>
<body>

<div>
  <div class="stage">
    <div class="outer"></div>

    <div class="inner" id="inner">
      <div class="grid"></div>
      <div class="shadow"></div>
    </div>

    <div class="ringWrap">
      <div class="ring"></div>
    </div>

    <div class="arrow left" id="arrowLeft">⬅</div>
    <div class="arrow right" id="arrowRight">➡</div>
    <div class="arrow up" id="arrowUp">⬆</div>
    <div class="arrow down" id="arrowDown">⬇</div>

  </div>

  <div class="meta" id="meta">Tilt: 0°</div>
  <button id="start">Start</button>
</div>

<script>
const inner = document.getElementById('inner');
const meta = document.getElementById('meta');

const arrowLeft = document.getElementById('arrowLeft');
const arrowRight = document.getElementById('arrowRight');
const arrowUp = document.getElementById('arrowUp');
const arrowDown = document.getElementById('arrowDown');

let tx=0, ty=0, x=0, y=0, vx=0, vy=0;
const spring=0.09;
const friction=0.84;
const sense=2.5;
let running=false;

function animate(){

  vx += (tx - x) * spring;
  vy += (ty - y) * spring;

  vx *= friction;
  vy *= friction;

  x += vx;
  y += vy;

  const dist = Math.hypot(x,y);

  /* STRONG WRAP EFFECT */
  const bendX = y * -1.4;
  const bendY = x * 1.4;

  const depth = dist * 1.2;
  const scale = 1 + dist/180;

  inner.style.transform = `
    rotateX(${bendX}deg)
    rotateY(${bendY}deg)
    translateZ(${depth}px)
    scale(${scale})
  `;

  /* ARROW LOGIC */
  arrowLeft.classList.remove("show");
  arrowRight.classList.remove("show");
  arrowUp.classList.remove("show");
  arrowDown.classList.remove("show");

  if(Math.abs(x) > 8){
    if(x > 0){
      arrowLeft.classList.add("show");
    }else{
      arrowRight.classList.add("show");
    }
  }

  if(Math.abs(y) > 8){
    if(y > 0){
      arrowUp.classList.add("show");
    }else{
      arrowDown.classList.add("show");
    }
  }

  if(dist < 5){
    if(navigator.vibrate){
      navigator.vibrate(30);
    }
  }

  requestAnimationFrame(animate);
}

function handleOrientation(e){
  const gamma = e.gamma || 0;
  const beta = e.beta || 0;

  tx = gamma * sense;
  ty = beta * sense;

  const tiltMag = Math.hypot(gamma, beta);
  meta.textContent = "Tilt: " + tiltMag.toFixed(1) + "°";
}

async function start(){

  if(running){
    window.removeEventListener("deviceorientation", handleOrientation);
    running=false;
    return;
  }

  if(typeof DeviceOrientationEvent !== "undefined" &&
     typeof DeviceOrientationEvent.requestPermission === "function"){
     const res = await DeviceOrientationEvent.requestPermission();
     if(res !== "granted") return;
  }

  window.addEventListener("deviceorientation", handleOrientation);
  running=true;
}

document.getElementById("start").addEventListener("click", start);

animate();
</script>
</body>
</html>
