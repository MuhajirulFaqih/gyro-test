<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SOCAi SVG State Alignment</title>

<style>
body{
  margin:0;
  background:#0f0f14;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:system-ui;
  color:white;
}

.stage{
  position:relative;
  width:360px;
  height:360px;
}

.circleContainer{
  position:absolute;
  width:260px;
  height:260px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  overflow:hidden;
}

/* MASK GRID */
.masked{
  position:absolute;
  inset:0;
  border-radius:50%;
  -webkit-mask: radial-gradient(circle, white 100%, transparent 101%);
  mask: radial-gradient(circle, white 100%, transparent 101%);
}

.grid{
  position:absolute;
  inset:-40px;
  background:
    radial-gradient(circle, rgba(255,255,255,.35) 1.5px, transparent 1.6px);
  background-size:20px 20px;
  transform-style:preserve-3d;
  will-change:transform;
}

/* SVG STATES */
.stateSVG{
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:0;
  transition:opacity .25s ease;
}

.stateSVG.active{
  opacity:1;
}

/* ARROWS */
.arrow{
  position:absolute;
  font-size:22px;
  opacity:0;
  transition:.2s ease;
}

.arrow.show{
  opacity:1;
  transform:scale(1.2);
}

.arrow.left{ left:20px; top:50%; transform:translateY(-50%); }
.arrow.right{ right:20px; top:50%; transform:translateY(-50%); }
.arrow.up{ top:20px; left:50%; transform:translateX(-50%); }
.arrow.down{ bottom:20px; left:50%; transform:translateX(-50%); }

.meta{
  margin-top:380px;
  text-align:center;
  font-size:14px;
  opacity:.85;
}

button{
  display:block;
  margin:10px auto;
  padding:10px 14px;
  background:#222;
  border:1px solid #444;
  color:white;
  border-radius:8px;
}
</style>
</head>
<body>

<div>
  <div class="stage">

    <div class="circleContainer">

      <!-- MASKED GRID -->
      <div class="masked">
        <div class="grid" id="grid"></div>
      </div>

      <!-- SVG RED -->
      <svg class="stateSVG active" id="svgRed"
           viewBox="0 0 260 260">
        <circle cx="130" cy="130" r="125"
                stroke="#FF4D4D"
                stroke-width="4"
                fill="none"
                filter="drop-shadow(0 0 14px rgba(255,77,77,.6))"/>
      </svg>

      <!-- SVG YELLOW -->
      <svg class="stateSVG" id="svgYellow"
           viewBox="0 0 260 260">
        <circle cx="130" cy="130" r="125"
                stroke="#FFC857"
                stroke-width="4"
                fill="none"
                filter="drop-shadow(0 0 14px rgba(255,200,87,.6))"/>
      </svg>

      <!-- SVG GREEN -->
      <svg class="stateSVG" id="svgGreen"
           viewBox="0 0 260 260">
        <circle cx="130" cy="130" r="125"
                stroke="#2BE38C"
                stroke-width="4"
                fill="none"
                filter="drop-shadow(0 0 18px rgba(43,227,140,.8))"/>
      </svg>

      <!-- Arrows -->
      <div class="arrow left" id="arrowLeft">⬅</div>
      <div class="arrow right" id="arrowRight">➡</div>
      <div class="arrow up" id="arrowUp">⬆</div>
      <div class="arrow down" id="arrowDown">⬇</div>

    </div>

  </div>

  <div class="meta" id="meta">Correction: 0°</div>
  <button id="start">Start</button>
</div>

<script>
const grid = document.getElementById("grid");
const meta = document.getElementById("meta");

const svgRed = document.getElementById("svgRed");
const svgYellow = document.getElementById("svgYellow");
const svgGreen = document.getElementById("svgGreen");

const arrowLeft = document.getElementById("arrowLeft");
const arrowRight = document.getElementById("arrowRight");
const arrowUp = document.getElementById("arrowUp");
const arrowDown = document.getElementById("arrowDown");

let tx=0, ty=0, x=0, y=0, vx=0, vy=0;
const spring=0.09;
const friction=0.85;
const sense=2.6;
const maxErr=40;
let running=false;
let snapped=false;

const targetGamma=0;
const targetBeta=0;

function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

function setState(dist){

  svgRed.classList.remove("active");
  svgYellow.classList.remove("active");
  svgGreen.classList.remove("active");

  if(dist > 22){
    svgRed.classList.add("active");
    snapped=false;
  }
  else if(dist > 10){
    svgYellow.classList.add("active");
    snapped=false;
  }
  else{
    svgGreen.classList.add("active");
    if(!snapped){
      if(navigator.vibrate) navigator.vibrate(40);
      snapped=true;
    }
  }
}

function animate(){

  vx += (tx - x) * spring;
  vy += (ty - y) * spring;

  vx *= friction;
  vy *= friction;

  x += vx;
  y += vy;

  const dist = Math.hypot(x,y);

  if(dist < 3){
    x *= 0.7;
    y *= 0.7;
  }

  const bendX = y * -1.2;
  const bendY = x * 1.2;
  const depth = dist * 1.1;
  const scale = 1 + dist/220;

  grid.style.transform = `
    rotateX(${bendX}deg)
    rotateY(${bendY}deg)
    translateZ(${depth}px)
    scale(${scale})
  `;

  setState(dist);

  requestAnimationFrame(animate);
}

function updateArrows(ex, ey){

  arrowLeft.classList.remove("show");
  arrowRight.classList.remove("show");
  arrowUp.classList.remove("show");
  arrowDown.classList.remove("show");

  if(Math.abs(ex) > 8){
    if(ex > 0) arrowRight.classList.add("show");
    else arrowLeft.classList.add("show");
  }

  if(Math.abs(ey) > 8){
    if(ey > 0) arrowDown.classList.add("show");
    else arrowUp.classList.add("show");
  }
}

function handleOrientation(e){
  const gamma = e.gamma || 0;
  const beta = e.beta || 0;

  const errorX = targetGamma - gamma;
  const errorY = targetBeta - beta;

  tx = clamp(errorX * sense, -maxErr, maxErr);
  ty = clamp(errorY * sense, -maxErr, maxErr);

  meta.innerText = "Correction: " + Math.hypot(errorX,errorY).toFixed(1) + "°";

  updateArrows(errorX, errorY);
}

async function start(){

  if(running){
    window.removeEventListener("deviceorientation", handleOrientation);
    running=false;
    return;
  }

  if(typeof DeviceOrientationEvent !== "undefined" &&
     typeof DeviceOrientationEvent.requestPermission === "function"){
    const res = await DeviceOrientationEvent.requestPermission();
    if(res !== "granted") return;
  }

  window.addEventListener("deviceorientation", handleOrientation);
  running=true;
}

document.getElementById("start").addEventListener("click", start);

animate();
</script>

</body>
</html>
